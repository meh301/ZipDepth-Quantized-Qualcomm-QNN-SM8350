<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1300 1000"
     width="1300"
     height="1000"
     shape-rendering="crispEdges">
  <title>Camera calibration checkerboard: 10 by 7 inner corners</title>
  <desc>Eleven columns by eight rows of squares, with a white safety margin.</desc>
  <rect width="1300" height="1000" fill="#ffffff"/>
  <defs>
    <pattern id="checker" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="100" height="100" fill="#000000"/>
      <rect x="100" y="100" width="100" height="100" fill="#000000"/>
    </pattern>
  </defs>
  <rect x="100" y="100" width="1100" height="800" fill="url(#checker)"/>
</svg>
