<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZipDepth camera calibration target</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #fff;
      font-family: system-ui, sans-serif;
    }
    main {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 1vmin;
      background: #fff;
      cursor: none;
    }
    img {
      display: block;
      width: min(100%, calc(100vh * 1.3));
      height: min(100%, calc(100vw / 1.3));
      object-fit: contain;
      image-rendering: pixelated;
    }
    button {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 2;
      padding: 10px 14px;
      color: #fff;
      background: rgba(0, 0, 0, .78);
      border: 0;
      border-radius: 5px;
      font: 600 14px system-ui, sans-serif;
      cursor: pointer;
    }
    :fullscreen button { display: none; }
  </style>
</head>
<body>
  <main id="target" title="Click to enter fullscreen">
    <img src="checkerboard-10x7.svg" alt="10 by 7 inner-corner calibration checkerboard">
  </main>
  <button id="fullscreen" type="button">ENTER FULLSCREEN</button>
  <script>
    const enterFullscreen = () => document.documentElement.requestFullscreen?.();
    document.getElementById('fullscreen').addEventListener('click', enterFullscreen);
    document.getElementById('target').addEventListener('click', enterFullscreen);
  </script>
</body>
</html>
